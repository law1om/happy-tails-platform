spring:
  application:
    name: happytails-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/happy_tails
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-test-query: SELECT 1
      connection-init-sql: SET client_encoding TO 'UTF8'
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  sql:
    init:
      mode: always
      data-locations: classpath:data-init.sql
      encoding: UTF-8
      continue-on-error: true
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: happy-tails-secret-key-2025-554-very-long-secret-key-for-jwt-token-generation
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds

logging:
  level:
    com.happytails: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
